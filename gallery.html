<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Switzerland Gallery</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(to right,#dbeafe,#ffffff);
        }

        .navbar{
            background:#1e3a8a;
            padding:15px;
            text-align:center;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:18px;
            font-weight:bold;
        }

        .navbar a:hover{
            color:yellow;
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin:30px;
        }

        .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .gallery img{
            width:350px;
            height:250px;
            object-fit:cover;
            border-radius:15px;
            box-shadow:0 0 15px gray;
            transition:0.4s;
        }

        .gallery img:hover{
            transform:scale(1.08);
        }

        footer{
            text-align:center;
            background:#1e3a8a;
            color:white;
            padding:20px;
            margin-top:20px;
        }

    </style>

</head>

<body>

        <a href="places.html">Places</a>
