<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(to right,#dbeafe,#ffffff);
        }

        .navbar{
            background:#1e3a8a;
            padding:15px;
            text-align:center;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-size:18px;
            font-weight:bold;
        }

        .navbar a:hover{
            color:yellow;
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-top:30px;
        }

        .contact-box{
            width:50%;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px lightgray;
        }

        label{
            font-size:18px;
            font-weight:bold;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            background:#1e3a8a;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#2563eb;
        }

        footer{
            text-align:center;
            background:#1e3a8a;
            color:white;
            padding:20px;
            margin-top:30px;
        }

    </style>

</head>

<body>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </div>

    <h1>Contact Us</h1>

    <div class="contact-box">

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Message</label>
            <textarea rows="5" placeholder="Write your message"></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

    <footer>
        Switzerland Travel Guide | Created by Palak
    </footer>

</body>

</html>
